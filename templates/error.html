{% extends "base.html" %}
{% block title %}{{ code }} · {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="error-wrap rise">
  <div class="error-code">{{ code }}</div>
  <h2>{{ heading }}</h2>
  <p>{{ message }}</p>
  <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('landing') }}" class="btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m15 18-6-6 6-6"/></svg>
    Go back
  </a>
</div>
{% endblock %}
